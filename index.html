<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Padel Americano Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        body { -webkit-tap-highlight-color: transparent; }
        
        .tab-active { border-bottom: 2px solid #10b981; color: #10b981; }
        .tab-inactive { color: #64748b; border-bottom: 2px solid transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- App Header -->
    <header class="bg-slate-900 text-white shadow-md sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🎾</span>
                <h1 class="text-xl font-bold tracking-tight">Padel Americano</h1>
            </div>
        </div>
        
        <!-- Navigation Tabs (Hidden initially) -->
        <nav id="nav-tabs" class="hidden bg-white border-b border-slate-200">
            <div class="max-w-3xl mx-auto flex">
                <button onclick="switchTab('players')" id="tab-players" class="flex-1 py-3 text-sm font-semibold transition-colors tab-active">Players</button>
                <button onclick="switchTab('matches')" id="tab-matches" class="flex-1 py-3 text-sm font-semibold transition-colors tab-inactive">Matches</button>
                <button onclick="switchTab('leaderboard')" id="tab-leaderboard" class="flex-1 py-3 text-sm font-semibold transition-colors tab-inactive">Standings</button>
            </div>
        </nav>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow w-full max-w-3xl mx-auto p-4 sm:p-6 pb-24">

        <!-- VIEW: SETUP -->
        <section id="view-setup" class="block animate-[fadeIn_0.3s]">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sm:p-8">
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Create Event</h2>
                <p class="text-slate-500 mb-6 text-sm">Set up your courts and scoring rules to begin.</p>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Tournament Format</label>
                        <select id="setup-format" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="standard">Standard Americano</option>
                            <option value="mixed">Mixed Americano (M+F Pairs)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Number of Courts</label>
                        <input type="number" id="setup-courts" min="1" max="20" value="2" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-1">Points per Match</label>
                        <select id="setup-points" onchange="toggleCustomPoints()" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="16">16 Points</option>
                            <option value="24">24 Points</option>
                            <option value="32" selected>32 Points (Standard)</option>
                            <option value="custom">Custom Score Limit</option>
                            <option value="unlimited">Unlimited (Play out matches)</option>
                        </select>
                    </div>
                    
                    <div id="custom-points-container" class="hidden">
                        <label class="block text-sm font-bold text-slate-700 mb-1">Custom Point Limit</label>
                        <input type="number" id="setup-custom-points" min="1" value="21" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                    
                    <button onclick="startEvent()" class="w-full mt-4 bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-sm transition-colors text-lg">
                        Start Event
                    </button>
                </div>
            </div>
        </section>

        <!-- VIEW: PLAYERS -->
        <section id="view-players" class="hidden animate-[fadeIn_0.3s]">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 sm:p-6 mb-6">
                <h2 class="text-xl font-bold text-slate-800 mb-4">Roster</h2>
                
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-player-name" placeholder="Enter player name..." class="flex-grow p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none" onkeypress="if(event.key === 'Enter') addPlayer()">
                    <select id="new-player-gender" class="hidden p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-slate-700">
                        <option value="M">Male (M)</option>
                        <option value="F">Female (F)</option>
                    </select>
                    <button onclick="addPlayer()" class="bg-slate-900 text-white px-5 rounded-xl font-bold hover:bg-slate-800 transition-colors">Add</button>
                </div>

                <div id="player-status-message" class="text-sm font-medium text-amber-600 bg-amber-50 p-3 rounded-lg mb-4 hidden border border-amber-200">
                    <!-- Status message injected via JS -->
                </div>

                <div class="bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                    <ul id="player-list" class="divide-y divide-slate-200">
                        <!-- Player items injected here -->
                    </ul>
                </div>
            </div>
            
            <button id="btn-generate-first" onclick="generateRound()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-sm transition-colors text-lg hidden">
                Generate 1st Round
            </button>
        </section>

        <!-- VIEW: MATCHES -->
        <section id="view-matches" class="hidden animate-[fadeIn_0.3s]">
            <div id="rounds-container" class="space-y-6">
                <!-- Rounds injected here -->
            </div>
            
            <div class="mt-6" id="action-buttons-container">
                <button id="btn-generate-next" onclick="generateRound()" class="w-full bg-emerald-500 hover:bg-emerald-600 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-4 rounded-xl shadow-sm transition-colors text-lg">
                    Generate Next Round
                </button>
                <div id="tournament-complete-msg" class="hidden text-center p-6 bg-emerald-100 text-emerald-800 font-bold rounded-2xl border border-emerald-200 shadow-sm">
                    <div class="text-3xl mb-2">🏆</div>
                    <h3 class="text-xl mb-1">Tournament Complete!</h3>
                    <p class="text-sm font-medium text-emerald-700">All possible unique partnerships have been played. Check the Standings!</p>
                </div>
            </div>
        </section>

        <!-- VIEW: LEADERBOARD -->
        <section id="view-leaderboard" class="hidden animate-[fadeIn_0.3s]">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-900 p-6 text-center text-white">
                    <h2 class="text-2xl font-black uppercase tracking-widest">Standings</h2>
                    <p id="leaderboard-subtitle" class="text-emerald-400 text-sm font-medium mt-1">Race to 32 points per match</p>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-100 text-slate-600 text-sm uppercase tracking-wide border-b border-slate-200">
                                <th class="p-4 font-bold w-12 text-center">#</th>
                                <th class="p-4 font-bold">Player</th>
                                <th class="p-4 font-bold text-center">PTS</th>
                                <th class="p-4 font-bold text-center text-xs">GAP</th>
                                <th class="p-4 font-bold text-center text-xs">PLAYED</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body" class="divide-y divide-slate-100">
                            <!-- Leaderboard rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <!-- Custom Notification Toast -->
    <div id="toast" class="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full font-medium shadow-lg transition-all duration-300 opacity-0 pointer-events-none translate-y-4 z-50 whitespace-nowrap">
        Message
    </div>

    <script>
        // --- APP STATE ---
        let config = {
            format: 'standard',
            courts: 2,
            targetPoints: 32,
            isUnlimited: false,
            isStarted: false
        };
        
        let players = [];
        let rounds = [];
        let currentTab = 'players';

        // --- CORE LOGIC ---

        function toggleCustomPoints() {
            const val = document.getElementById('setup-points').value;
            const container = document.getElementById('custom-points-container');
            if (val === 'custom') {
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        function startEvent() {
            config.format = document.getElementById('setup-format').value;
            config.courts = parseInt(document.getElementById('setup-courts').value) || 1;
            const ptsVal = document.getElementById('setup-points').value;
            
            if (ptsVal === 'custom') {
                config.targetPoints = parseInt(document.getElementById('setup-custom-points').value) || 21;
                config.isUnlimited = false;
            } else if (ptsVal === 'unlimited') {
                config.targetPoints = 0;
                config.isUnlimited = true;
            } else {
                config.targetPoints = parseInt(ptsVal);
                config.isUnlimited = false;
            }
            config.isStarted = true;
            
            const subtitle = document.getElementById('leaderboard-subtitle');
            if (config.isUnlimited) {
                subtitle.innerText = `Unlimited Points - Play out matches`;
            } else {
                subtitle.innerText = `Race to ${config.targetPoints} points per match`;
            }
            
            document.getElementById('nav-tabs').classList.remove('hidden');
            
            if (config.format === 'mixed') {
                document.getElementById('new-player-gender').classList.remove('hidden');
            }
            
            if(players.length === 0) {
                const dummyNames = ['Ibrahim', 'Muhammad', 'Saeed', 'Ali', 'Zain', 'Omar', 'Tariq', 'Hassan'];
                for(let i=0; i < (config.courts * 4); i++) {
                    players.push({ id: generateId(), name: dummyNames[i] || `Player ${i+1}`, gender: i % 2 === 0 ? 'M' : 'F', active: true });
                }
            }
            
            renderPlayers();
            switchTab('players');
            showToast("Event Started! Check the roster.");
        }

        function addPlayer() {
            const input = document.getElementById('new-player-name');
            const genderInput = document.getElementById('new-player-gender');
            const name = input.value.trim();
            if (!name) return;

            players.push({ id: generateId(), name: name, gender: genderInput.value, active: true, played: 0 });
            input.value = '';
            renderPlayers();
            
            if (rounds.length > 0) {
                showToast(`${name} added! They will join the next round.`);
            }
        }

        function togglePlayerStatus(id) {
            // Check if player has played any matches
            const hasPlayed = rounds.some(r => r.matches.some(m => m.team1.includes(id) || m.team2.includes(id)));
            const player = players.find(p => p.id === id);
            
            if (hasPlayed) {
                // If they have played, toggle active/withdrawn state to not ruin old scores
                player.active = !player.active;
                showToast(`${player.name} marked as ${player.active ? 'Active' : 'Withdrawn'}.`);
            } else {
                // If they haven't played, we can safely delete them entirely
                players = players.filter(p => p.id !== id);
            }
            
            renderPlayers();
            
            // Re-evaluate if we need to block the tournament generator
            if (rounds.length > 0 && players.filter(p => p.active).length < 4) {
                showToast("Warning: Not enough active players to generate rounds.");
            }
        }

        function renderPlayers() {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            
            players.forEach(p => {
                const li = document.createElement('li');
                li.className = `flex justify-between items-center p-4 transition-colors ${p.active ? 'hover:bg-slate-100 bg-white' : 'bg-slate-100 opacity-60'}`;
                
                const actionIcon = p.active 
                    ? `<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>`
                    : `<svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path></svg>`;
                
                const titleAttr = p.active ? "Remove / Withdraw" : "Restore Player";

                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-slate-800 ${!p.active ? 'line-through text-slate-500' : ''}">${p.name}</span>
                        ${config.format === 'mixed' ? `<span class="text-xs font-bold px-2 py-1 rounded-full ${p.gender === 'M' ? 'bg-blue-100 text-blue-700' : 'bg-pink-100 text-pink-700'}">${p.gender}</span>` : ''}
                        ${!p.active ? `<span class="text-xs font-bold px-2 py-1 rounded-full bg-slate-200 text-slate-600">Withdrawn</span>` : ''}
                    </div>
                    <button onclick="togglePlayerStatus('${p.id}')" title="${titleAttr}" class="p-2 rounded-lg transition-colors ${p.active ? 'hover:bg-red-50' : 'hover:bg-emerald-50 bg-emerald-100'}">
                        ${actionIcon}
                    </button>
                `;
                list.appendChild(li);
            });

            const statusMsg = document.getElementById('player-status-message');
            const btnGenerateFirst = document.getElementById('btn-generate-first');
            const required = config.courts * 4;
            
            const activePlayers = players.filter(p => p.active);
            let canStart = false;
            let msg = '';

            if (config.format === 'mixed') {
                const men = activePlayers.filter(p => p.gender === 'M').length;
                const women = activePlayers.filter(p => p.gender === 'F').length;
                
                if (men < 2 || women < 2) {
                    msg = `You need at least <strong>2 Active Men and 2 Active Women</strong> for Mixed. (Current: ${men}M, ${women}F)`;
                } else {
                    let pairs = Math.min(men, women);
                    let validPlayers = (pairs % 2 === 0 ? pairs : pairs - 1) * 2;
                    if (validPlayers < 4) {
                        msg = `You need an even number of mixed pairs to form matches. Add more players.`;
                    } else {
                        canStart = true;
                        msg = `You have <strong>${men}M and ${women}F active</strong>. ${validPlayers} players can be matched. `;
                        if (validPlayers > required) msg += `Some will rest.`;
                        else if (validPlayers < required) msg += `Not all courts will be used.`;
                        else msg += `Perfect number for ${config.courts} courts!`;
                    }
                }
            } else {
                if (activePlayers.length < 4) {
                    msg = `You need at least <strong>4 active players</strong> to play. (Current: ${activePlayers.length})`;
                } else {
                    canStart = true;
                    msg = `You have <strong>${activePlayers.length} active players</strong>. `;
                    if (activePlayers.length % 4 !== 0) msg += `Some players will rest each round.`;
                    else if (activePlayers.length > required) msg += `More players than court capacity. Some will rest.`;
                    else if (activePlayers.length < required) msg += `Not enough for ${config.courts} courts. Only ${Math.floor(activePlayers.length/4)} court(s) will be active.`;
                    else msg += `Perfect number for ${config.courts} courts!`;
                }
            }
            
            statusMsg.innerHTML = msg;
            statusMsg.classList.remove('hidden');

            if (canStart) {
                statusMsg.classList.replace('text-amber-600', 'text-emerald-700');
                statusMsg.classList.replace('bg-amber-50', 'bg-emerald-50');
                statusMsg.classList.replace('border-amber-200', 'border-emerald-200');
                if (rounds.length === 0) btnGenerateFirst.classList.remove('hidden');
                else btnGenerateFirst.classList.add('hidden');
            } else {
                statusMsg.classList.replace('text-emerald-700', 'text-amber-600');
                statusMsg.classList.replace('bg-emerald-50', 'bg-amber-50');
                statusMsg.classList.replace('border-emerald-200', 'border-amber-200');
                btnGenerateFirst.classList.add('hidden');
            }
            
            if (players.length === 0) {
                list.innerHTML = `<li class="p-6 text-center text-slate-400 font-medium">No players added yet.</li>`;
                statusMsg.classList.add('hidden');
            }
        }

        function getPastPartners() {
            const partners = new Set();
            rounds.forEach(round => {
                round.matches.forEach(match => {
                    const t1 = [...match.team1].sort();
                    const t2 = [...match.team2].sort();
                    partners.add(`${t1[0]}-${t1[1]}`);
                    partners.add(`${t2[0]}-${t2[1]}`);
                });
            });
            return partners;
        }

        function findValidPairings(playersToPair, pastPartners) {
            const pairs = [];
            const used = new Array(playersToPair.length).fill(false);
            
            function backtrack(count) {
                if (count === playersToPair.length) return true;
                
                let p1Idx = used.indexOf(false);
                if (p1Idx === -1) return false;
                used[p1Idx] = true;
                
                const p1Obj = playersToPair[p1Idx];
                const p1 = p1Obj.id;
                
                for (let p2Idx = p1Idx + 1; p2Idx < playersToPair.length; p2Idx++) {
                    if (!used[p2Idx]) {
                        const p2Obj = playersToPair[p2Idx];
                        
                        if (config.format === 'mixed' && p1Obj.gender === p2Obj.gender) {
                            continue;
                        }

                        const p2 = p2Obj.id;
                        const pairKey = [p1, p2].sort().join('-');
                        
                        if (!pastPartners.has(pairKey)) {
                            used[p2Idx] = true;
                            pairs.push([p1, p2]);
                            
                            if (backtrack(count + 2)) return true;
                            
                            pairs.pop();
                            used[p2Idx] = false;
                        }
                    }
                }
                used[p1Idx] = false;
                return false;
            }
            
            return backtrack(0) ? pairs : null;
        }

        function generateRound() {
            updateLeaderboardStats(); 
            
            // Only consider ACTIVE players for generating the round
            const activePlayers = players.filter(p => p.active);
            
            // Calculate scheduled matches (including unlocked) to ensure perfect balancing
            // even if the user generates multiple rounds ahead of time without locking scores.
            const scheduledCounts = {};
            activePlayers.forEach(p => scheduledCounts[p.id] = 0);
            rounds.forEach(r => {
                r.matches.forEach(m => {
                    m.team1.forEach(id => { if (scheduledCounts[id] !== undefined) scheduledCounts[id]++; });
                    m.team2.forEach(id => { if (scheduledCounts[id] !== undefined) scheduledCounts[id]++; });
                });
            });
            
            let finalPlaying = [];
            let resting = [];
            
            if (config.format === 'mixed') {
                let men = activePlayers.filter(p => p.gender === 'M').sort((a, b) => scheduledCounts[a.id] - scheduledCounts[b.id]);
                let women = activePlayers.filter(p => p.gender === 'F').sort((a, b) => scheduledCounts[a.id] - scheduledCounts[b.id]);
                
                const pairsNeeded = config.courts * 2;
                let actualPairs = Math.min(men.length, women.length);
                if (actualPairs % 2 !== 0) actualPairs -= 1; 
                actualPairs = Math.min(actualPairs, pairsNeeded);
                
                let playingMen = men.slice(0, actualPairs);
                let playingWomen = women.slice(0, actualPairs);
                
                finalPlaying = [...playingMen, ...playingWomen];
                resting = [...men.slice(actualPairs), ...women.slice(actualPairs)];
            } else {
                let availablePlayers = [...activePlayers].sort((a, b) => scheduledCounts[a.id] - scheduledCounts[b.id]);
                const maxPlayers = config.courts * 4;
                const targetPlayingCount = Math.min(availablePlayers.length - (availablePlayers.length % 4), maxPlayers);
                finalPlaying = availablePlayers.slice(0, targetPlayingCount);
                resting = availablePlayers.slice(targetPlayingCount);
            }
            
            const pastPartners = getPastPartners();
            let pairings = findValidPairings(finalPlaying, pastPartners);
            
            if (!pairings) {
                let found = false;
                for (let attempt = 0; attempt < 100; attempt++) {
                    let attemptPlaying = [];
                    let attemptResting = [];
                    
                    if (config.format === 'mixed') {
                        let men = activePlayers.filter(p => p.gender === 'M').sort((a, b) => (scheduledCounts[a.id] - scheduledCounts[b.id]) + (Math.random() * 0.5 - 0.25));
                        let women = activePlayers.filter(p => p.gender === 'F').sort((a, b) => (scheduledCounts[a.id] - scheduledCounts[b.id]) + (Math.random() * 0.5 - 0.25));
                        
                        const pairsNeeded = config.courts * 2;
                        let actualPairs = Math.min(men.length, women.length);
                        if (actualPairs % 2 !== 0) actualPairs -= 1;
                        actualPairs = Math.min(actualPairs, pairsNeeded);
                        
                        attemptPlaying = [...men.slice(0, actualPairs), ...women.slice(0, actualPairs)];
                        attemptResting = [...men.slice(actualPairs), ...women.slice(actualPairs)];
                    } else {
                        let shuffled = [...activePlayers].sort((a, b) => (scheduledCounts[a.id] - scheduledCounts[b.id]) + (Math.random() * 0.5 - 0.25));
                        const maxPlayers = config.courts * 4;
                        const targetPlayingCount = Math.min(shuffled.length - (shuffled.length % 4), maxPlayers);
                        attemptPlaying = shuffled.slice(0, targetPlayingCount);
                        attemptResting = shuffled.slice(targetPlayingCount);
                    }
                    
                    let attemptPairings = findValidPairings(attemptPlaying, pastPartners);
                    
                    if (attemptPairings) {
                        finalPlaying = attemptPlaying;
                        resting = attemptResting;
                        pairings = attemptPairings;
                        found = true;
                        break;
                    }
                }
                
                if (!found) {
                    showToast("No more unique partnerships possible! Tournament Complete.");
                    document.getElementById('btn-generate-next').classList.add('hidden');
                    document.getElementById('tournament-complete-msg').classList.remove('hidden');
                    return;
                }
            }
            
            for (let i = pairings.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pairings[i], pairings[j]] = [pairings[j], pairings[i]];
            }

            const newMatches = [];
            let courtNum = 1;
            
            for (let i = 0; i < pairings.length; i += 2) {
                newMatches.push({
                    id: generateId(),
                    court: courtNum++,
                    team1: pairings[i],
                    team2: pairings[i+1],
                    score1: '',
                    score2: '',
                    locked: false
                });
            }

            rounds.push({
                roundNum: rounds.length + 1,
                matches: newMatches,
                resting: resting.map(p => p.id)
            });

            renderMatches();
            switchTab('matches');
            showToast(`Round ${rounds.length} Generated!`);
            
            document.getElementById('btn-generate-first').classList.add('hidden');
        }

        function renderMatches() {
            const container = document.getElementById('rounds-container');
            container.innerHTML = '';
            
            [...rounds].reverse().forEach((round, revIndex) => {
                const isLatest = revIndex === 0;
                
                let roundHtml = `
                    <div class="bg-white rounded-2xl shadow-sm border ${isLatest ? 'border-emerald-400 ring-2 ring-emerald-100' : 'border-slate-200 opacity-80'} overflow-hidden">
                        <div class="${isLatest ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-700'} p-4 flex justify-between items-center">
                            <h3 class="font-bold text-lg">Round ${round.roundNum}</h3>
                            ${round.resting.length > 0 ? `<span class="text-xs font-bold px-3 py-1 rounded-full ${isLatest ? 'bg-white/20 text-white' : 'bg-slate-200 text-slate-600'}">Resting: ${round.resting.length}</span>` : ''}
                        </div>
                        <div class="p-4 space-y-4">
                `;

                round.matches.forEach(match => {
                    const p1 = getPlayer(match.team1[0]).name;
                    const p2 = getPlayer(match.team1[1]).name;
                    const p3 = getPlayer(match.team2[0]).name;
                    const p4 = getPlayer(match.team2[1]).name;
                    
                    const isLocked = match.locked;
                    const inputClass = isLocked 
                        ? 'w-16 bg-slate-100 border-transparent text-slate-500 font-bold text-center p-2 rounded-lg' 
                        : 'w-16 bg-white border-2 border-slate-300 focus:border-emerald-500 focus:ring-0 font-bold text-center p-2 rounded-lg text-lg';

                    roundHtml += `
                        <div class="border rounded-xl p-4 ${isLocked ? 'bg-slate-50 border-slate-200' : 'bg-white border-slate-200'}">
                            <div class="text-xs font-bold text-slate-400 mb-3 tracking-widest uppercase">Court ${match.court}</div>
                            
                            <div class="flex justify-between items-center mb-3">
                                <div class="leading-tight">
                                    <div class="font-bold text-slate-800">${p1}</div>
                                    <div class="font-bold text-slate-800">${p2}</div>
                                </div>
                                <div>
                                    <input type="number" min="0" onchange="updateScore(${round.roundNum}, '${match.id}', 1, this.value)" value="${match.score1}" ${isLocked ? 'disabled' : ''} class="${inputClass}" placeholder="0">
                                </div>
                            </div>
                            
                            <div class="w-full h-px bg-slate-100 my-2"></div>
                            
                            <div class="flex justify-between items-center mt-3">
                                <div class="leading-tight">
                                    <div class="font-bold text-slate-800">${p3}</div>
                                    <div class="font-bold text-slate-800">${p4}</div>
                                </div>
                                <div>
                                    <input type="number" min="0" onchange="updateScore(${round.roundNum}, '${match.id}', 2, this.value)" value="${match.score2}" ${isLocked ? 'disabled' : ''} class="${inputClass}" placeholder="0">
                                </div>
                            </div>
                            
                            <button onclick="toggleMatchLock(${round.roundNum}, '${match.id}')" class="w-full mt-4 py-2 rounded-lg font-bold text-sm transition-colors ${isLocked ? 'bg-slate-200 text-slate-600 hover:bg-slate-300' : 'bg-slate-900 text-white hover:bg-slate-800'}">
                                ${isLocked ? 'Unlock & Edit Match' : 'Save & Lock Score'}
                            </button>
                        </div>
                    `;
                });

                roundHtml += `</div></div>`;
                container.innerHTML += roundHtml;
            });
            
            checkRoundComplete();
        }

        function updateScore(roundNum, matchId, team, value) {
            const round = rounds.find(r => r.roundNum === roundNum);
            const match = round.matches.find(m => m.id === matchId);
            if(team === 1) match.score1 = value;
            if(team === 2) match.score2 = value;
        }

        function toggleMatchLock(roundNum, matchId) {
            const round = rounds.find(r => r.roundNum === roundNum);
            const match = round.matches.find(m => m.id === matchId);
            
            if (!match.locked && (match.score1 === '' || match.score2 === '')) {
                showToast("Please enter scores for both teams.");
                return;
            }
            
            match.locked = !match.locked;
            updateLeaderboardStats();
            renderMatches();
        }

        function checkRoundComplete() {
            if (rounds.length === 0) return;
            
            // Check if ALL matches in ALL rounds are locked before allowing the next round
            const allMatchesLocked = rounds.every(r => r.matches.every(m => m.locked));
            const btnNext = document.getElementById('btn-generate-next');
            
            if (allMatchesLocked) {
                btnNext.classList.remove('opacity-50', 'cursor-not-allowed');
                btnNext.disabled = false;
            } else {
                btnNext.classList.add('opacity-50', 'cursor-not-allowed');
                btnNext.disabled = true;
            }
        }

        function updateLeaderboardStats() {
            players.forEach(p => {
                p.points = 0; p.conceded = 0; p.diff = 0; p.played = 0;
            });

            rounds.forEach(round => {
                round.matches.forEach(match => {
                    if (match.locked) {
                        const s1 = parseInt(match.score1) || 0;
                        const s2 = parseInt(match.score2) || 0;

                        match.team1.forEach(id => {
                            let p = getPlayer(id);
                            p.points += s1;
                            p.conceded += s2;
                            p.played += 1;
                        });
                        
                        match.team2.forEach(id => {
                            let p = getPlayer(id);
                            p.points += s2;
                            p.conceded += s1;
                            p.played += 1;
                        });
                    }
                });
            });
            
            players.forEach(p => {
                p.diff = p.points - p.conceded;
            });
            
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            
            const sortedPlayers = [...players].sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                return b.diff - a.diff; 
            });

            sortedPlayers.forEach((p, index) => {
                const row = document.createElement('tr');
                row.className = index === 0 && p.played > 0 ? 'bg-amber-50/50' : 'hover:bg-slate-50';
                
                let gapToAbove = '-';
                if (index > 0 && p.played > 0) {
                    const gap = (sortedPlayers[index - 1].points || 0) - (p.points || 0);
                    gapToAbove = `-${gap}`;
                } else if (index > 0) {
                    gapToAbove = '0';
                }
                
                row.innerHTML = `
                    <td class="p-4 text-center font-black text-slate-400">
                        ${index === 0 && p.played > 0 ? '<span class="text-amber-500 text-lg">1</span>' : index + 1}
                    </td>
                    <td class="p-4 font-bold text-slate-800">
                        <span class="${!p.active ? 'line-through text-slate-400' : ''}">${p.name}</span>
                        ${index === 0 && p.played > 0 && p.active ? '<span class="ml-1 text-amber-500">👑</span>' : ''}
                        ${!p.active ? '<span class="text-xs ml-2 bg-slate-200 text-slate-500 px-2 py-0.5 rounded">Withdrawn</span>' : ''}
                    </td>
                    <td class="p-4 text-center">
                        <span class="bg-emerald-100 text-emerald-800 py-1 px-3 rounded-full font-black text-base border border-emerald-200">
                            ${p.points || 0}
                        </span>
                    </td>
                    <td class="p-4 text-center text-slate-500 font-medium text-sm">
                        ${gapToAbove}
                    </td>
                    <td class="p-4 text-center text-slate-400 text-sm">
                        ${p.played || 0}
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // --- UTILS ---
        function switchTab(tab) {
            ['setup', 'players', 'matches', 'leaderboard'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
            });
            ['players', 'matches', 'leaderboard'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if(el) {
                    el.className = t === tab 
                        ? 'flex-1 py-3 text-sm font-semibold transition-colors tab-active' 
                        : 'flex-1 py-3 text-sm font-semibold transition-colors tab-inactive';
                }
            });

            document.getElementById(`view-${tab}`).classList.remove('hidden');
            
            if(tab === 'leaderboard') updateLeaderboardStats();
            if(tab === 'matches') renderMatches();
        }

        function getPlayer(id) {
            return players.find(p => p.id === id) || { name: 'Unknown', active: false };
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

    </script>
</body>
</html>
